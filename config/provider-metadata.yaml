name: timeweb-cloud/timeweb-cloud
resources:
    twc_database_backup Resource - Timeweb Cloud:
        subCategory: ""
        description: Resource for describing needed database backup and provides actual information about its status
        name: twc_database_backup Resource - Timeweb Cloud
        title: twc_database_backup Resource - Timeweb Cloud
        argumentDocs:
            cluster_id: (Number) Database cluster ID for which backup should be created
            comment: (String) Comment for backup
            created_at: (String) Date when backup was created
            id: (String) The ID of this resource.
            name: (String) Name of backup
            size: (Number) Backups size
            status: (String) Current status of backup
            type: (String) Backup type (manual or auto)
        importStatements: []
    twc_database_backup_schedule Resource - Timeweb Cloud:
        subCategory: ""
        description: Resource for describing needed database auto backup properties and schedule
        name: twc_database_backup_schedule Resource - Timeweb Cloud
        title: twc_database_backup_schedule Resource - Timeweb Cloud
        argumentDocs:
            cluster_id: (Number) Database cluster ID for which database auto backups should be configured
            copy_count: (Number) Maximum stored copy count
            creation_start_at: (String) Creation date for first backup
            day_of_week: (Number) Day of the week when auto backup should be created. Allowed only for week interval, counting starts from 1 (Monday)
            enabled: (Boolean) Enable auto backups
            id: (String) The ID of this resource.
            interval: (String) Interval between auto backups
        importStatements: []
    twc_database_cluster:
        subCategory: ""
        description: Resource for describing needed database cluster and provides actual information about its status
        name: twc_database_cluster
        title: twc_database_cluster Resource - Timeweb Cloud
        examples:
            - name: example-mysql-8
              manifest: |-
                {
                  "config_parameters": {
                    "auto_increment_increment": 3
                  },
                  "name": "example_mysql_8",
                  "preset_id": "${data.twc_database_preset.example-db-preset.id}",
                  "type": "mysql"
                }
              references:
                preset_id: data.twc_database_preset.example-db-preset.id
        argumentDocs:
            availability_zone: (String) Availability zone for database cluster
            config_parameters: (Map of String) Configuration parameters for database cluster
            description: (String) Description for project
            disk_stats: (List of Object) Information about database disk stats (see below for nested schema)
            hash_type: (String) Hash type for database
            id: (String) The ID of this resource.
            ip: (String)
            ips: (List of Object) (see below for nested schema)
            is_external_ip: (Boolean) Flag that shows allowability database only by external IP address
            location: (String) Location for the server (ru-1, ru-2, de-1, kz-1, etc.)
            name: (String) Name for database cluster
            network: '(Block List, Max: 1) Network for database cluster (see below for nested schema)'
            networks: (List of Object) (see below for nested schema)
            parameters: (Map of String) Configuration parameters for database cluster
            port: (Number) Listening port for incoming connections
            preset_id: (Number) Preset ID for database cluster
            project_id: (Number) Project ID for managed resource
            replications: (Number) Number of replication instances
            size: (Number)
            status: (String) Current status of database cluster (started, starting, stopped, no_paid)
            type: (String) Type of database cluster
            used: (Number)
        importStatements: []
    twc_database_instance:
        subCategory: ""
        description: Resource for describing needed database instance and provides actual information about its status
        name: twc_database_instance
        title: twc_database_instance Resource - Timeweb Cloud
        examples:
            - name: example-mysql-8-instance
              manifest: |-
                {
                  "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                  "name": "example"
                }
              references:
                cluster_id: twc_database_cluster.example-mysql-8.id
              dependencies:
                twc_database_cluster.example-mysql-8: |-
                    {
                      "name": "example_mysql_8",
                      "preset_id": "${data.twc_database_preset.example-db-preset.id}",
                      "type": "mysql"
                    }
        argumentDocs:
            cluster_id: (Number) Database cluster ID for which backup instance be created
            description: (String) Description for project
            id: (String) The ID of this resource.
            name: (String) Name for database instance
        importStatements: []
    twc_database_user:
        subCategory: ""
        description: Resource for describing needed database user and provides actual information about its status
        name: twc_database_user
        title: twc_database_user Resource - Timeweb Cloud
        examples:
            - name: example-mysql-8-user
              manifest: |-
                {
                  "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                  "login": "admin",
                  "password": "examplepassword1",
                  "privileges": [
                    "SELECT",
                    "INSERT",
                    "UPDATE",
                    "DELETE",
                    "ALTER",
                    "REFERENCES",
                    "CREATE",
                    "DROP",
                    "INDEX"
                  ]
                }
              references:
                cluster_id: twc_database_cluster.example-mysql-8.id
              dependencies:
                twc_database_cluster.example-mysql-8: |-
                    {
                      "name": "example_mysql_8",
                      "preset_id": "${data.twc_database_preset.example-db-preset.id}",
                      "type": "mysql"
                    }
                twc_database_instance.example-mysql-8-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "example"
                    }
                twc_database_instance.example-mysql-8-other-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "otherexample"
                    }
                twc_database_instance.example-mysql-8-some-other-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "someotherexample"
                    }
            - name: example-mysql-8-user
              manifest: |-
                {
                  "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                  "instance": [
                    {
                      "instance_id": "${twc_database_instance.example-mysql-8-instance.id}",
                      "privileges": [
                        "SELECT",
                        "INSERT",
                        "UPDATE",
                        "DELETE"
                      ]
                    }
                  ],
                  "login": "otheruser",
                  "password": "examplepassword1"
                }
              references:
                cluster_id: twc_database_cluster.example-mysql-8.id
                instance.instance_id: twc_database_instance.example-mysql-8-instance.id
              dependencies:
                twc_database_cluster.example-mysql-8: |-
                    {
                      "name": "example_mysql_8",
                      "preset_id": "${data.twc_database_preset.example-db-preset.id}",
                      "type": "mysql"
                    }
                twc_database_instance.example-mysql-8-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "example"
                    }
                twc_database_instance.example-mysql-8-other-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "otherexample"
                    }
                twc_database_instance.example-mysql-8-some-other-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "someotherexample"
                    }
            - name: example-mysql-8-user
              manifest: |-
                {
                  "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                  "instance": [
                    {
                      "instance_id": "${twc_database_instance.example-mysql-8-instance.id}",
                      "privileges": [
                        "SELECT",
                        "INSERT",
                        "UPDATE",
                        "DELETE"
                      ]
                    },
                    {
                      "instance_id": "${twc_database_instance.example-mysql-8-other-instance.id}",
                      "privileges": [
                        "SELECT",
                        "INSERT",
                        "UPDATE",
                        "DELETE"
                      ]
                    }
                  ],
                  "login": "someotheruser",
                  "password": "examplepassword1"
                }
              references:
                cluster_id: twc_database_cluster.example-mysql-8.id
                instance.instance_id: twc_database_instance.example-mysql-8-other-instance.id
              dependencies:
                twc_database_cluster.example-mysql-8: |-
                    {
                      "name": "example_mysql_8",
                      "preset_id": "${data.twc_database_preset.example-db-preset.id}",
                      "type": "mysql"
                    }
                twc_database_instance.example-mysql-8-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "example"
                    }
                twc_database_instance.example-mysql-8-other-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "otherexample"
                    }
                twc_database_instance.example-mysql-8-some-other-instance: |-
                    {
                      "cluster_id": "${twc_database_cluster.example-mysql-8.id}",
                      "name": "someotherexample"
                    }
        argumentDocs:
            cluster_id: (Number) Database cluster ID for which user be created
            description: (String) Description for user
            host: (String) Allowed host for login as this user
            id: (String) The ID of this resource.
            instance: (Block List) Privileges of user by instance (see below for nested schema)
            instance_id: (Number) Database instance ID for which user has privileges
            login: (String) Login for user
            password: (String, Sensitive) Password for user
            privileges: (List of String) Privileges of user
        importStatements: []
    twc_db_backup:
        subCategory: ""
        description: Resource for describing needed DB backup and provides actual information about its status
        name: twc_db_backup
        title: twc_db_backup Resource - Timeweb Cloud
        examples:
            - name: example-db-backup
              manifest: |-
                {
                  "comment": "Example database",
                  "source_db_id": "${twc_db_postgres.example-postgres.id}"
                }
              references:
                source_db_id: twc_db_postgres.example-postgres.id
              dependencies:
                twc_db_postgres.example-postgres: |-
                    {
                      "autovacuum_analyze_scale_factor": 0.001,
                      "bgwriter_delay": 101,
                      "bgwriter_lru_maxpages": 102,
                      "deadlock_timeout": 103,
                      "gin_pending_list_limit": 104,
                      "idle_in_transaction_session_timeout": 115,
                      "idle_session_timeout": 106,
                      "is_external_ip": true,
                      "join_collapse_limit": 107,
                      "lock_timeout": 108,
                      "login": "example_login",
                      "max_connections": 110,
                      "max_prepared_transactions": 109,
                      "name": "example_postgres",
                      "password": "example_password",
                      "preset_id": "${data.twc_db_preset.example-db-postgres-preset.id}",
                      "shared_buffers": 111,
                      "temp_buffers": 113,
                      "wal_buffers": 112,
                      "work_mem": 114
                    }
        argumentDocs:
            comment: (String) Comment for backup
            created_at: (String) Date when backup was created
            id: (String) The ID of this resource.
            name: (String) Name of backup
            size: (Number) Backups size
            source_db_id: (Number) DB ID for which backup should be created
            status: (String) Current status of backup
            type: (String) Backup type (manual or auto)
        importStatements: []
    twc_db_backup_schedule:
        subCategory: ""
        description: Resource for describing needed DB auto backup properties and schedule
        name: twc_db_backup_schedule
        title: twc_db_backup_schedule Resource - Timeweb Cloud
        examples:
            - name: example-db-backup-schedule
              manifest: |-
                {
                  "copy_count": 5,
                  "creation_start_at": "2023-02-02T00:00:00.000Z",
                  "enabled": true,
                  "interval": "month",
                  "source_db_id": "${twc_db_postgres.example-postgres.id}"
                }
              references:
                source_db_id: twc_db_postgres.example-postgres.id
              dependencies:
                twc_db_postgres.example-postgres: |-
                    {
                      "autovacuum_analyze_scale_factor": 0.001,
                      "bgwriter_delay": 101,
                      "bgwriter_lru_maxpages": 102,
                      "deadlock_timeout": 103,
                      "gin_pending_list_limit": 104,
                      "idle_in_transaction_session_timeout": 115,
                      "idle_session_timeout": 106,
                      "is_external_ip": true,
                      "join_collapse_limit": 107,
                      "lock_timeout": 108,
                      "login": "example_login",
                      "max_connections": 110,
                      "max_prepared_transactions": 109,
                      "name": "example_postgres",
                      "password": "example_password",
                      "preset_id": "${data.twc_db_preset.example-db-postgres-preset.id}",
                      "shared_buffers": 111,
                      "temp_buffers": 113,
                      "wal_buffers": 112,
                      "work_mem": 114
                    }
        argumentDocs:
            copy_count: (Number) Maximum stored copy count
            creation_start_at: (String) Creation date for first backup
            day_of_week: (Number) Day of the week when auto backup should be created. Allowed only for week interval, counting starts from 1 (Monday)
            enabled: (Boolean) Enable auto backups
            id: (String) The ID of this resource.
            interval: (String) Interval between auto backups
            source_db_id: (Number) DB ID for which DB auto backups should be configured
        importStatements: []
    twc_db_mongodb:
        subCategory: ""
        description: Resource for describing needed MongoDB database and provides actual information about its status
        name: twc_db_mongodb
        title: twc_db_mongodb Resource - Timeweb Cloud
        examples:
            - name: example-mongodb
              manifest: |-
                {
                  "login": "example_login",
                  "name": "example_mongodb",
                  "password": "example_password",
                  "preset_id": "${data.twc_db_preset.example-db-preset.id}"
                }
              references:
                preset_id: data.twc_db_preset.example-db-preset.id
        argumentDocs:
            disk_stats: (List of Object) Information about database disk stats (see below for nested schema)
            host: (String) Host for connection to database
            id: (String) The ID of this resource.
            ip: (String) IP-address database of network interface
            is_external_ip: (Boolean) Flag that shows allowability database only by external IP address
            local_ip: (String) Local IP-address database of network interface
            local_network: '(Block List, Max: 1) Flag that enables local network for DB (see below for nested schema)'
            login: (String) Login for database
            name: (String) Name for database
            password: (String, Sensitive) Password for database
            port: (Number) Port for connection to database
            preset_id: (Number) Preset ID for database
            project_id: (Number) Project ID for created DB
            size: (Number)
            status: (String) Current status of database (started, starting, stoped, no_paid)
            used: (Number)
        importStatements:
            - |-
              # Database can be imported by specifying the numeric identifier from URL
              terraform import twc_db_mongodb.example 42
