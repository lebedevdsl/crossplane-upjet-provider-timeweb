apiVersion: ssh.timeweb.m.crossplane.io/v1alpha1
kind: SSHKey
metadata:
  annotations:
    meta.upbound.io/example-id: ssh/v1alpha1/sshkey
  labels:
    testing.upbound.io/example-name: example-key
  name: example-key
  namespace: crossplane-system
spec:
  forProvider:
    body: ${file("~/.ssh/some-key.pub")}
    name: Example

---

apiVersion: server.timeweb.m.crossplane.io/v1alpha1
kind: Server
metadata:
  annotations:
    meta.upbound.io/example-id: ssh/v1alpha1/sshkey
  labels:
    testing.upbound.io/example-name: example-server
  name: example-server
  namespace: crossplane-system
spec:
  forProvider:
    name: Example server
    osId: ${data.twc_os.example-os.id}
    presetId: ${data.twc_presets.example-preset.id}
    sshKeysIdsRefs:
    - name: example-key
