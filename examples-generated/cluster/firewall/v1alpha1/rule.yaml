apiVersion: firewall.timeweb.crossplane.io/v1alpha1
kind: Rule
metadata:
  annotations:
    meta.upbound.io/example-id: firewall/v1alpha1/rule
  labels:
    testing.upbound.io/example-name: example-firewall-rules
  name: example-firewall-rules
spec:
  forProvider:
    cidr: 0.0.0.0/0
    description: Some example firewall rule
    direction: ingress
    firewallIdSelector:
      matchLabels:
        testing.upbound.io/example-name: twc_firewall
    port: 80
    protocol: tcp

---

apiVersion: firewall.timeweb.crossplane.io/v1alpha1
kind: Firewall
metadata:
  annotations:
    meta.upbound.io/example-id: firewall/v1alpha1/rule
  labels:
    testing.upbound.io/example-name: example-firewall
  name: example-firewall
spec:
  forProvider:
    description: Some example firewall
    name: example-firewall
